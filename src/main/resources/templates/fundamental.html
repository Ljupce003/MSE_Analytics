<!DOCTYPE html>
<html lang="mk" xmlns:th="http://www.thymeleaf.org">
<head>

  <th:block th:replace="~{fragments :: header_scripts}"></th:block>
  <title>МСЕ Аналитика | Фундаментална Анализа</title>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .sentiment-positive { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .sentiment-negative { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .sentiment-neutral { background-color: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .loader-spin { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">



<div th:replace="~{fragments :: navbar('fundamental')}"></div>

<main class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

  <div class="mb-8 text-center">
    <h1 class="text-3xl font-extrabold text-gray-900">НЛП Фундаментална Анализа</h1>
    <p class="mt-2 text-gray-500">Анализа на расположениeто (Sentiment Analysis) базирана на најновите вести за издавачите</p>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8">
    <form action="/fundamental" method="POST" class="flex flex-col md:flex-row items-end gap-4">
      <div class="flex-grow space-y-2 text-left">
        <label for="stockDropdown" class="block text-sm font-semibold text-gray-700 ml-1">Изберете издавач за анализа:</label>
        <select name="code" id="stockDropdown" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 outline-none transition">
          <option value="">-- Избери акција --</option>
          <option th:each="sifra : ${codes_dropdown}" th:text="${sifra}" th:value="${sifra}"></option>
        </select>
      </div>
      <button type="submit" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition flex items-center justify-center gap-2 shadow-md shadow-blue-100">
        <i class="fas fa-brain"></i> Анализирај
      </button>
    </form>

    <div th:if="${error != null or analysis_error != null}" class="mt-4 p-3 bg-red-50 border border-red-100 rounded-lg text-red-600 text-sm flex items-center gap-2">
      <i class="fas fa-circle-exclamation"></i>
      <span th:text="${error != null ? error : analysis_error}"></span>
    </div>
  </div>

  <div id="result-container" th:if="${issuer != null}" class="animate-in fade-in duration-500">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col items-center justify-center">
        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Генерален Заклучок</span>
        <div id="res_badge" class="px-6 py-2 rounded-full text-xl font-bold uppercase tracking-wide">
          <i id="res_icon" class="mr-2"></i>
          <span id="res_span" th:text="${issuer.result}"></span>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col items-center justify-center">
        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Прецизност на моделот</span>
        <div class="flex items-baseline gap-1 text-blue-900">
          <span class="text-4xl font-black" th:text="${#numbers.formatDecimal(issuer.score * 100, 1, 1)}"></span>
          <span class="text-xl font-bold">%</span>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-1.5 mt-4 max-w-[200px]">
          <div class="bg-blue-600 h-1.5 rounded-full" th:style="'width:' + ${issuer.score * 100} + '%'"></div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50 flex items-center justify-between">
        <h3 class="font-bold text-gray-800 flex items-center gap-2">
          <i class="far fa-newspaper text-blue-500"></i> Анализирани Вести
        </h3>
        <span class="text-xs text-gray-400" th:text="${#lists.size(issuer.rss_items)} + ' извори пронајдени'"></span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead class="bg-gray-50 text-gray-500 font-medium uppercase text-[10px] tracking-wider">
          <tr>
            <th class="px-6 py-3">Наслов на вест</th>
            <th class="px-6 py-3">Датум</th>
            <th class="px-6 py-3 text-right">Линк</th>
          </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
          <tr th:each="rss : ${issuer.rss_items}" class="hover:bg-blue-50/30 transition">
            <td class="px-6 py-4 font-semibold text-gray-800 leading-snug" th:text="${rss.title}"></td>
            <td class="px-6 py-4 text-gray-500 whitespace-nowrap" th:text="${rss.pub_date}"></td>
            <td class="px-6 py-4 text-right">
              <a th:href="${rss.link}" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium flex items-center justify-end gap-1">
                Прочитај <i class="fas fa-external-link-alt text-[10px]"></i>
              </a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>

<script>
  function applySentimentStyling() {
    const span = document.getElementById("res_span");
    const badge = document.getElementById("res_badge");
    const icon = document.getElementById("res_icon");

    if (span) {
      const text = span.textContent.trim().toLowerCase();
      if (text === "positive") {
        badge.className += " sentiment-positive";
        icon.className = "fas fa-arrow-trend-up";
        span.textContent = "Bullish / Позитивно";
      } else if (text === "negative") {
        badge.className += " sentiment-negative";
        icon.className = "fas fa-arrow-trend-down";
        span.textContent = "Bearish / Негативно";
      } else {
        badge.className += " sentiment-neutral";
        icon.className = "fas fa-minus";
        span.textContent = "Neutral / Неутрално";
      }
    }
  }

  document.addEventListener('DOMContentLoaded', applySentimentStyling);
</script>
<script src="/js/autoRefresh.js"></script>
</body>
</html>
