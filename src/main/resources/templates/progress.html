<!DOCTYPE html>
<html lang="mk" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: header_scripts}"></th:block>
    <title>МСЕ Аналитика | Оперативен Преглед</title>
    <style>
        body {
            font-family: 'Inter', sans-serif !important;
        }
        .progress-bar-running { background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-bar-complete { background: linear-gradient(90deg, #10b981, #34d399); }
        .pulse-active { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<div th:replace="~{fragments :: navbar('admin')}"></div>

<main class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-10 text-center md:text-left flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Системски Монитор</h1>
            <p class="text-gray-500 mt-1">Следење на скриптите за обработка на податоци во реално време</p>
        </div>
        <div id="last-updated" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest bg-white px-3 py-1 rounded-full border border-gray-200">
            Чекање на статус...
        </div>
    </div>

    <div id="scripts-container" class="space-y-6">
        <div class="flex flex-col items-center justify-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm">
            <div class="w-12 h-12 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin mb-4"></div>
            <p class="text-gray-400 font-medium">Се вчитува состојбата на системот...</p>
        </div>
    </div>

</main>

<div th:replace="~{fragments :: footer}"></div>

<script th:inline="javascript">
    const SCRIPT_DISPLAY_NAMES = {
        "Main.py": "Собирање на податоци",
        "Fundamental_processing.py": "NLP Фундаментална анализа",
        "LSTM.py": "LSTM Предвидувања"
    };

    const SCRIPT_ORDER = ["Main.py", "Fundamental_processing.py", "LSTM.py"];
    const SCRIPT_ICONS = {
        "Main.py": "fa-cloud-download-alt",
        "Fundamental_processing.py": "fa-microchip",
        "LSTM.py": "fa-robot"
    };

    function formatElapsed(seconds) {
        if (seconds < 60) return seconds + "с";
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}м ${s}с`;
    }

    function getStatusInfo(data) {
        if (data.complete && data.percentage >= 100) {
            return { label: "Завршено", css: "bg-green-100 text-green-700", bar: "progress-bar-complete", pulse: "" };
        }
        if (data.percentage > 0 || data.currentIndex > 0) {
            return { label: "Во тек", css: "bg-blue-100 text-blue-700", bar: "progress-bar-running", pulse: "pulse-active bg-blue-500" };
        }
        return { label: "Чекање", css: "bg-gray-100 text-gray-500", bar: "bg-gray-200", pulse: "bg-gray-300" };
    }

    function renderCard(key, data) {
        const pct = data.percentage.toFixed(1);
        const status = getStatusInfo(data);
        const icon = SCRIPT_ICONS[key] || "fa-terminal";
        const displayName = SCRIPT_DISPLAY_NAMES[key] || key;

        return `
            <div class="bg-white rounded-3xl border border-gray-200 shadow-sm overflow-hidden transition-all hover:shadow-md">
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 flex items-center justify-center bg-gray-50 rounded-2xl text-blue-600 border border-gray-100">
                                <i class="fas ${icon} fa-lg"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-gray-900">${displayName}</h3>
                                <div class="flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full ${status.pulse}"></span>
                                    <span class="text-[10px] font-black uppercase tracking-tighter ${status.css} px-2 py-0.5 rounded-md">${status.label}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right text-sm font-black text-blue-600">${pct}%</div>
                    </div>

                    <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden mb-6">
                        <div class="h-full rounded-full ${status.bar}" style="width: ${pct}%"></div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 border-t border-gray-50 pt-6">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Тековно</span>
                            <span class="text-sm font-semibold truncate text-gray-700">${data.currentItem || '—'}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Прогрес</span>
                            <span class="text-sm font-semibold text-gray-700">${data.currentIndex} / ${data.totalItems}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Време</span>
                            <span class="text-sm font-semibold text-gray-700">${formatElapsed(data.elapsedSeconds)}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">ETA</span>
                            <span class="text-sm font-semibold text-blue-600">${data.eta}</span>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-900 px-6 py-3 text-[11px] font-mono text-blue-400 flex items-center gap-3">
                    <span class="text-gray-500 font-bold underline">LOG:</span>
                    <span class="truncate">${data.message || 'Системот е во мирување...'}</span>
                </div>
            </div>`;
    }

    function poll() {
        fetch('/api/progress')
            .then(r => r.json())
            .then(all => {
                const container = document.getElementById('scripts-container');
                const keys = Object.keys(all);

                if (keys.length === 0) {
                    container.innerHTML = `
                            <div class="text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm text-gray-400">
                                <i class="fas fa-check-circle text-4xl mb-4 text-green-500 opacity-20"></i>
                                <p>Нема активни скрипти во моментов.</p>
                            </div>`;
                } else {
                    const sorted = keys.sort((a, b) => {
                        const ia = SCRIPT_ORDER.indexOf(a);
                        const ib = SCRIPT_ORDER.indexOf(b);
                        return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
                    });
                    container.innerHTML = sorted.map(k => renderCard(k, all[k])).join('');
                }

                document.getElementById('last-updated').textContent = 'Последно ажурирано: ' + new Date().toLocaleTimeString();
                const anyRunning = keys.some(k => !all[k].complete);
                setTimeout(poll, anyRunning ? 1000 : 5000);
            })
            .catch(err => {
                console.error("Poll error:", err);
                setTimeout(poll, 3000);
            });
    }

    document.addEventListener('DOMContentLoaded', poll);
</script>
</body>
</html>
